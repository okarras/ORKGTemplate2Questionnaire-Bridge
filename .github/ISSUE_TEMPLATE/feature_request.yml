name: Feature Request
description: Suggest a new feature or enhancement
title: '[Feature]: '
labels: ['enhancement', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Describe the idea in plain language first. Use **GitHub Copilot** or
        `npm run issue:enhance -- --type feature --text "…"` to expand it.
        See [CONTRIBUTING.md](docs/CONTRIBUTING.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the feature
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work from a user perspective?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you thought about (optional)
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Concrete checklist of what “done” looks like
      placeholder: |
        - [ ] User can …
        - [ ] Existing … behavior is unchanged
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend (Next.js / HeroUI)
        - API routes
        - ORKG integration / SPARQL
        - Questionnaire / ScidQuest
        - PDF export
        - AI features
        - Template preprocessing
        - ORKG Sandbox submission
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for similar requests
          required: true
